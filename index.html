<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ideal App – Feature Showcase & Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Hero section */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #8b949e;
            max-width: 600px;
            margin: 0 auto 1.5rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #238636;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(35,134,54,0.3);
        }

        .download-btn:hover {
            background: #2ea043;
            transform: translateY(-1px);
        }

        .version-tag {
            display: block;
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 0.75rem;
        }

        /* Carousel */
        .carousel-container {
            position: relative;
            margin: 2rem 0 3rem;
            background: #161b22;
            border-radius: 16px;
            border: 1px solid #30363d;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .carousel-slides {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .slides-wrapper {
            display: flex;
            transition: transform 0.4s ease-in-out;
        }

        .slide {
            flex: 0 0 100%;
            width: 100%;
        }

        .slide img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            background: #0d1117;
            display: block;
            border-bottom: 1px solid #30363d;
        }

        .slide-caption {
            padding: 1.2rem;
            text-align: center;
            background: #161b22;
        }

        .slide-caption h3 {
            font-size: 1.5rem;
            color: #58a6ff;
            margin-bottom: 0.5rem;
        }

        .slide-caption p {
            color: #8b949e;
            font-size: 0.95rem;
        }

        /* Navigation buttons */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 50%;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
            z-index: 10;
            line-height: 1;
        }

        .carousel-btn:hover {
            background: rgba(0,0,0,0.9);
        }

        .prev-btn {
            left: 10px;
        }

        .next-btn {
            right: 10px;
        }

        /* Dots indicator */
        .dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 0;
            background: #161b22;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #30363d;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dot.active {
            background: #58a6ff;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #30363d;
            font-size: 0.8rem;
            color: #6e7681;
        }

        @media (max-width: 700px) {
            .hero h1 { font-size: 2rem; }
            .container { padding: 1rem; }
            .carousel-btn { font-size: 1.5rem; padding: 0.3rem 0.8rem; }
            .slide-caption h3 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Ideal App</h1>
        <p>All‑in‑one productivity tool with 9 powerful features. Swipe through the screenshots and download now.</p>
        <a href="https://github.com/idealknight000/Ideal.github.io/releases/download/v_1.0/Ideal_v_2_6_release.apk" class="download-btn">
            ⬇️ Download APK
        </a>
        <span class="version-tag">Version 2.6 Release</span>
    </div>

    <div class="carousel-container">
        <div class="carousel-slides">
            <div class="slides-wrapper" id="slidesWrapper">
                <!-- Slides will be injected via JS -->
            </div>
            <button class="carousel-btn prev-btn" id="prevBtn">‹</button>
            <button class="carousel-btn next-btn" id="nextBtn">›</button>
        </div>
        <div class="dots" id="dotsContainer"></div>
    </div>

    <div class="footer">
        <p>© 2026 Ideal App. Free and open source.</p>
    </div>
</div>

<script>
    // Feature data: image filename, title, description
    const features = [
        { img: "Screenshot_20260326_061303_Ideal.jpg", title: "🏠 Home", desc: "Your dashboard with daily overview, stats, and quick access to all tools." },
        { img: "Screenshot_20260326_061306_Ideal.jpg", title: "⚙️ Settings", desc: "Customise theme, notifications, and app behaviour to match your style." },
        { img: "Screenshot_20260326_061310_Ideal.jpg", title: "👤 Profile", desc: "Manage your personal info, avatar, and track your progress." },
        { img: "Screenshot_20260326_061315_Ideal.jpg", title: "📅 Schedule", desc: "Plan your week, set reminders, and never miss important tasks." },
        { img: "Screenshot_20260326_061319_Ideal.jpg", title: "⏱️ Timer & Stopwatch", desc: "Focus sessions, countdowns, and precise time tracking for any activity." },
        { img: "Screenshot_20260326_061322_Ideal.jpg", title: "🧠 Question Solver", desc: "Get step‑by‑step solutions for math, logic, and general questions." },
        { img: "Screenshot_20260326_061335_Ideal.jpg", title: "📊 Analytics", desc: "Track productivity, task completion, and see your improvement over time." },
        { img: "Screenshot_20260326_062047_Ideal.jpg", title: "🏆 Achievements", desc: "Earn badges and celebrate milestones as you use the app." },
        { img: "Screenshot_20260326_062232_Ideal.jpg", title: "🎨 Hobbies", desc: "Log your interests, discover new activities, and stay inspired." }
    ];

    let currentIndex = 0;
    const slidesWrapper = document.getElementById('slidesWrapper');
    const dotsContainer = document.getElementById('dotsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    // Build slides and dots
    function buildCarousel() {
        slidesWrapper.innerHTML = '';
        dotsContainer.innerHTML = '';

        features.forEach((feature, idx) => {
            // Slide
            const slide = document.createElement('div');
            slide.className = 'slide';
            slide.innerHTML = `
                <img src="${feature.img}" alt="${feature.title} screenshot">
                <div class="slide-caption">
                    <h3>${feature.title}</h3>
                    <p>${feature.desc}</p>
                </div>
            `;
            slidesWrapper.appendChild(slide);

            // Dot
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.addEventListener('click', () => goToSlide(idx));
            dotsContainer.appendChild(dot);
        });

        updateCarousel();
    }

    function updateCarousel() {
        const slideWidth = slidesWrapper.parentElement.clientWidth;
        slidesWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
        // Update active dot
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
            if (idx === currentIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    function goToSlide(index) {
        if (index < 0) index = 0;
        if (index >= features.length) index = features.length - 1;
        currentIndex = index;
        updateCarousel();
    }

    function nextSlide() {
        if (currentIndex + 1 < features.length) {
            currentIndex++;
        } else {
            currentIndex = 0; // loop to start
        }
        updateCarousel();
    }

    function prevSlide() {
        if (currentIndex - 1 >= 0) {
            currentIndex--;
        } else {
            currentIndex = features.length - 1; // loop to end
        }
        updateCarousel();
    }

    // Event listeners
    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    // Optional: swipe support for touch devices
    let touchStartX = 0;
    let touchEndX = 0;
    const carouselContainer = document.querySelector('.carousel-container');
    carouselContainer.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    carouselContainer.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        if (touchEndX < touchStartX - 50) nextSlide();
        if (touchEndX > touchStartX + 50) prevSlide();
    });

    // Build on load
    buildCarousel();

    // Resize handling: re-align on window resize
    window.addEventListener('resize', () => {
        updateCarousel();
    });
</script>
</body>
</html>
